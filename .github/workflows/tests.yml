# Runs the test suite on every push and pull request. Tests only:
# this workflow never rebuilds data, never writes to data/, and never
# touches data/predictions/ locks. The suite itself makes no live
# network calls (fixtures only).
name: tests

on:
  push:
  pull_request:

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run tests
        run: pytest
